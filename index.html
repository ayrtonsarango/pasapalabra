<!DOCTYPE html>
<html lang="es">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<meta http-equiv="X-UA-Compatible" content="ie=edge">
	<link rel="stylesheet" href="css/style.css">
	<title>Pasapalabra</title>
</head>
<body>
	<main class="game">
		<section class="circle-container" aria-label="Rosco">
			<div id="js--boards" class="boards-grid" data-count="1" aria-label="Roscos en juego"></div>
		</section>

		<section class="controls-container" aria-label="Panel de control">
			<button id="js--close" class="close-button hidden" type="button" aria-label="Terminar partida"></button>

			<div id="js--ng-controls" class="control-view ng-controls">
				<p class="eyebrow">Menu inicial</p>
				<h1 class="control-title">Pasapalabra</h1>
				<p class="lead">Modo individual o por equipos, con tiempos y roscos configurables.</p>
				<div class="menu-actions">
					<button id="js--quick-game" class="btn btn--primary" type="button"><i class="icon-play"></i>Jugar ahora</button>
					<button id="js--customize-game" class="btn btn--blue" type="button">Configurar</button>
				</div>
			</div>

			<div id="js--config-controls" class="control-view config-controls hidden">
				<p class="eyebrow">Configuracion</p>
				<h2 class="section-title">Ajustar rosco</h2>
				<div class="config-row">
					<label class="field-label" for="js--team-count">Roscos</label>
					<select id="js--team-count" class="select-input">
						<option value="1">1 rosco</option>
						<option value="2">2 roscos</option>
						<option value="3">3 roscos</option>
						<option value="4">4 roscos</option>
					</select>
				</div>
				<div id="js--teams-config" class="teams-config" aria-label="Configuracion de roscos"></div>
				<div class="menu-actions">
					<button id="js--start-custom-game" class="btn btn--primary" type="button"><i class="icon-play"></i>Jugar con cambios</button>
					<button id="js--back-menu" class="btn btn--blue" type="button">Volver</button>
				</div>
			</div>

			<div id="js--question-controls" class="control-view question-controls hidden">
				<p id="js--turn-label" class="eyebrow">Turno</p>
				<span id="js--hint" class="hint" aria-live="polite"></span>
				<p id="js--definition" class="definition"></p>

				<div id="js--answer-buttons" class="answer-buttons">
					<button id="js--play-turn" class="btn btn--primary hidden" type="button"><i class="icon-play"></i>Empezar turno</button>
					<button id="js--bien" class="btn btn--green" type="button">Bien</button>
					<button id="js--mal" class="btn btn--red" type="button">Mal</button>
					<button id="js--pasapalabra" class="btn btn--yellow" type="button">Pasapalabra</button>
					<button id="js--pause" class="btn btn--blue" type="button">Pausa</button>
				</div>
			</div>

			<div id="js--pa-controls" class="control-view pa-controls hidden">
				<p class="eyebrow">Resultado</p>
				<p id="js--end-title" class="title"></p>
				<p id="js--end-subtitle" class="subtitle"></p>
				<div class="menu-actions">
					<button id="js--pa" class="btn btn--primary" type="button"><i class="icon-loop"></i>Jugar de nuevo</button>
					<button id="js--menu" class="btn btn--blue" type="button">Menu</button>
				</div>
			</div>
		</section>
	</main>
	<footer>
		<p>Made by 🦎 <a href="https://geckoders.es/">Geckoders</a></p>
	</footer>
	<script src="js/app.js"></script>
</body>
</html>
